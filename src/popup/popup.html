<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../lib/tokens.css" />
  <link rel="stylesheet" href="popup.css" />
  <title>Compy</title>
</head>
<body>
  <div class="pop">
    <header class="pop-head">
      <div class="brand">
        <img class="brand-mark" src="../icons/icon128.png" width="26" height="26" alt="Compy" />
        <span class="brand-name">Compy</span>
      </div>
      <div class="head-actions">
        <button id="copyAi" class="btn btn-primary btn-sm" title="Copy this page's new & changed notes for your AI" aria-label="Copy for AI">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3m0 12v3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1M3 12h3m12 0h3M5.6 18.4l2.1-2.1m8.6-8.6 2.1-2.1"/></svg>
          AI
        </button>
        <button id="addPageNote" class="btn btn-ghost btn-icon" title="Add a page note" aria-label="Add page note">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="shot" class="btn btn-ghost btn-icon" title="Screenshot & annotate" aria-label="Screenshot and annotate">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h1.2a2 2 0 0 0 1.7-1l.6-1a2 2 0 0 1 1.7-1h3.6a2 2 0 0 1 1.7 1l.6 1a2 2 0 0 0 1.7 1H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.2"/></svg>
        </button>
        <button id="openDash" class="btn btn-ghost btn-icon" title="Open dashboard (Alt+Shift+D)" aria-label="Open dashboard">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        </button>
      </div>
    </header>

    <div class="page-bar">
      <div class="page-meta">
        <div id="pageTitle" class="page-title">This page</div>
        <div id="pageHost" class="page-host"></div>
      </div>
      <div id="counts" class="counts"></div>
    </div>

    <div id="searchWrap" class="search-wrap" hidden>
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Filter notes on this page…" />
    </div>

    <main id="list" class="list" aria-live="polite"></main>

    <footer class="pop-foot">
      <div class="shortcuts">
        <span><kbd>Alt</kbd><kbd>⇧</kbd><kbd>H</kbd> highlight</span>
        <span><kbd>Alt</kbd><kbd>⇧</kbd><kbd>N</kbd> + note</span>
        <span><kbd>Alt</kbd><kbd>⇧</kbd><kbd>M</kbd> page</span>
      </div>
    </footer>
  </div>
  <div id="toast" class="pop-toast" hidden></div>

  <script src="../lib/store.js"></script>
  <script src="../lib/exporters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
