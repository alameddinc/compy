<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:440px; height:280px; overflow:hidden; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background: radial-gradient(120% 140% at 15% 10%, #7c3aed 0%, #6d28d9 45%, #4c1d95 100%);
    color:#fff; display:flex; flex-direction:column; justify-content:center;
    padding:30px 32px; position:relative;
  }
  .glow { position:absolute; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle,#a855f7 0%,transparent 70%); opacity:.45; right:-70px; bottom:-90px; }
  .top { display:flex; align-items:center; gap:12px; }
  .logo { width:56px; height:56px; background:#fff; border-radius:15px; display:grid; place-items:center;
    box-shadow:0 8px 22px rgba(0,0,0,.28); }
  .logo img { width:40px; height:40px; }
  .name { font-size:34px; font-weight:800; letter-spacing:-0.02em; }
  h1 { font-size:23px; font-weight:750; line-height:1.2; margin-top:22px; letter-spacing:-0.02em; max-width:360px; }
  .sub { margin-top:12px; font-size:14px; font-weight:600; color:#e9d5ff; }
  .flow { margin-top:16px; display:flex; gap:8px; }
  .chip { font-size:12px; font-weight:700; background:rgba(255,255,255,.16); padding:6px 11px; border-radius:999px;
    backdrop-filter:blur(4px); }
</style></head>
<body>
  <div class="glow"></div>
  <div class="top">
    <span class="logo"><img src="/c.png" alt=""></span>
    <span class="name">Compy</span>
  </div>
  <h1>Highlight the web.<br>Hand it to your AI.</h1>
  <div class="flow">
    <span class="chip">Highlight</span>
    <span class="chip">Note</span>
    <span class="chip">Copy for AI</span>
  </div>
  <div class="sub">Local-first &amp; private · no account</div>
</body></html>
